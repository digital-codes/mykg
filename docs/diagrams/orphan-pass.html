<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>myKG · Orphan-Connection Pass</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #f5f5f5;
      --color-ink:     #2d3142;
      --color-muted:   #4f5d75;
      --color-accent:  #6366f1;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1200px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture · myKG · Orphan-connection pass</p>
    <h1>Two stages: cheap co-occurrence scoring, then one LLM call per chunk group</h1>

    <svg viewBox="0 0 1000 640" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f5f5"/>

      <!-- ─── Stage rail labels ─── -->
      <text x="40" y="124" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">STAGE 1</text>
      <text x="40" y="136" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">no llm</text>

      <text x="40" y="312" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">STAGE 2</text>
      <text x="40" y="324" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">one llm call</text>
      <text x="40" y="336" fill="#4f5d75" font-size="9" font-family="'Geist', sans-serif">per group</text>

      <!-- Stage divider hairlines -->
      <line x1="116" y1="216" x2="960" y2="216" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
      <line x1="116" y1="448" x2="960" y2="448" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>

      <!-- ─── STAGE 1 row arrows: Input → Lookup → Groups ─── -->
      <line x1="280" y1="124" x2="332" y2="124" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <line x1="568" y1="124" x2="620" y2="124" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>

      <rect x="284" y="112" width="44" height="12" rx="2" fill="#f5f5f5"/>
      <text x="306" y="122" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">CHUNK?</text>

      <rect x="572" y="112" width="44" height="12" rx="2" fill="#f5f5f5"/>
      <text x="594" y="122" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">GROUP</text>

      <!-- ─── Bridge between stages: Candidate groups (right side) → Stage 2 LLM (center) ─── -->
      <!-- Candidate groups bottom (x=748, y=156) → down to y=312, then left to LLM box right edge (x=620, y=312) -->
      <line x1="748" y1="156" x2="748" y2="312" stroke="#4f5d75" stroke-width="1.2"/>
      <line x1="748" y1="312" x2="620" y2="312" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>

      <rect x="660" y="296" width="84" height="12" rx="2" fill="#f5f5f5"/>
      <text x="702" y="306" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">ONE PER GROUP</text>

      <!-- ─── Stage 2: LLM call (center) → Decision diamond (left) ─── -->
      <line x1="436" y1="312" x2="384" y2="312" stroke="#6366f1" stroke-width="1.4" marker-end="url(#arrow-accent)"/>

      <!-- ─── Outcomes from diamond (3 branches, all land on outcome row at y=512) ─── -->
      <!-- LEFT: edges found (focal) — vertical drop from diamond left point -->
      <line x1="200" y1="312" x2="200" y2="496" stroke="#6366f1" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <rect x="156" y="376" width="88" height="12" rx="2" fill="#f5f5f5"/>
      <text x="200" y="386" fill="#6366f1" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">EDGES FOUND</text>

      <!-- CENTER: no edges → unconnectable. Diamond bottom (x=296, y=352) → down to y=496 (outcome top) -->
      <line x1="296" y1="352" x2="296" y2="420" stroke="#4f5d75" stroke-width="1.0" stroke-dasharray="4,3"/>
      <line x1="296" y1="420" x2="608" y2="420" stroke="#4f5d75" stroke-width="1.0" stroke-dasharray="4,3"/>
      <line x1="608" y1="420" x2="608" y2="496" stroke="#4f5d75" stroke-width="1.0" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
      <rect x="320" y="404" width="64" height="12" rx="2" fill="#f5f5f5"/>
      <text x="352" y="414" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">NO EDGES</text>

      <!-- RIGHT: schema-gap escalation (dashed). LLM box bottom (x=528, y=344) → down to y=400 → right to x=872 → down to outcome top y=496 -->
      <line x1="528" y1="344" x2="528" y2="400" stroke="#4f5d75" stroke-width="1.0" stroke-dasharray="4,3"/>
      <line x1="528" y1="400" x2="872" y2="400" stroke="#4f5d75" stroke-width="1.0" stroke-dasharray="4,3"/>
      <line x1="872" y1="400" x2="872" y2="496" stroke="#4f5d75" stroke-width="1.0" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
      <rect x="640" y="388" width="100" height="12" rx="2" fill="#f5f5f5"/>
      <text x="690" y="398" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">SCHEMA GAP</text>

      <!-- ─── Node: Orphan nodes (input) ─── -->
      <rect x="112" y="92" width="168" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="112" y="92" width="168" height="64" rx="6" fill="rgba(79,93,117,0.10)" stroke="#7a8399" stroke-width="1"/>
      <rect x="120" y="100" width="48" height="12" rx="2" fill="transparent" stroke="rgba(122,131,153,0.40)" stroke-width="0.8"/>
      <text x="144" y="109" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">INPUT</text>
      <text x="196" y="128" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Orphan nodes</text>
      <text x="196" y="144" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">zero edges after assembly</text>

      <!-- ─── Node: Chunk lookup (Stage 1 step) ─── -->
      <rect x="332" y="92" width="236" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="332" y="92" width="236" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <rect x="340" y="100" width="56" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
      <text x="368" y="109" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">DETERMINISTIC</text>
      <text x="450" y="128" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Map orphan → source chunk</text>
      <text x="450" y="144" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">via chunk_node_index.json</text>

      <!-- ─── Node: Candidate groups (Stage 1 output) ─── -->
      <rect x="620" y="92" width="256" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="620" y="92" width="256" height="64" rx="6" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
      <rect x="628" y="100" width="48" height="12" rx="2" fill="transparent" stroke="rgba(79,93,117,0.50)" stroke-width="0.8"/>
      <text x="652" y="109" fill="#4f5d75" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STAGE 1</text>
      <text x="748" y="128" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Candidate groups</text>
      <text x="748" y="144" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">one per source chunk</text>

      <!-- ─── Stage 2: LLM call (center) ─── -->
      <rect x="436" y="280" width="184" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="436" y="280" width="184" height="64" rx="6" fill="rgba(99,102,241,0.08)" stroke="#6366f1" stroke-width="1"/>
      <rect x="444" y="288" width="56" height="12" rx="2" fill="transparent" stroke="rgba(99,102,241,0.50)" stroke-width="0.8"/>
      <text x="472" y="297" fill="#6366f1" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">LLM · STAGE 2</text>
      <text x="528" y="316" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Confirm edges from chunk</text>
      <text x="528" y="332" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">full text + orphans + schema</text>

      <!-- ─── Decision diamond at center (296, 312), w=176 h=80 ─── -->
      <polygon points="296,272 384,312 296,352 208,312" fill="#f5f5f5"/>
      <polygon points="296,272 384,312 296,352 208,312" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="296" y="308" fill="#2d3142" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">LLM result?</text>
      <text x="296" y="324" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">validate edges</text>

      <!-- ─── Outcome row at y=496..572 ─── -->
      <!-- LEFT: Confirmed → sidecar -->
      <rect x="116" y="496" width="200" height="76" rx="6" fill="#f5f5f5"/>
      <rect x="116" y="496" width="200" height="76" rx="6" fill="rgba(99,102,241,0.08)" stroke="#6366f1" stroke-width="1"/>
      <rect x="124" y="504" width="64" height="12" rx="2" fill="transparent" stroke="rgba(99,102,241,0.50)" stroke-width="0.8"/>
      <text x="156" y="513" fill="#6366f1" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">CONFIRMED</text>
      <text x="216" y="532" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Merge into sidecar</text>
      <text x="216" y="548" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">edge_metadata.json</text>
      <text x="216" y="564" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">method: orphan_inferred</text>

      <!-- CENTER: Unconnectable (advisory) -->
      <rect x="508" y="496" width="200" height="76" rx="6" fill="#f5f5f5"/>
      <rect x="508" y="496" width="200" height="76" rx="6" fill="rgba(79,93,117,0.10)" stroke="#7a8399" stroke-width="1"/>
      <rect x="516" y="504" width="56" height="12" rx="2" fill="transparent" stroke="rgba(122,131,153,0.40)" stroke-width="0.8"/>
      <text x="544" y="513" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">ADVISORY</text>
      <text x="608" y="532" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Unconnectable</text>
      <text x="608" y="548" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">logged to</text>
      <text x="608" y="564" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">orphan_log.json</text>

      <!-- RIGHT: Schema-gap escalation (dashed border) -->
      <rect x="772" y="496" width="200" height="76" rx="6" fill="#f5f5f5"/>
      <rect x="772" y="496" width="200" height="76" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1" stroke-dasharray="4,3"/>
      <rect x="780" y="504" width="64" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
      <text x="812" y="513" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">ESCALATION</text>
      <text x="872" y="532" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Schema-gap restart</text>
      <text x="872" y="548" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">propose new properties</text>
      <text x="872" y="564" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">surgical Pass 2 re-run</text>
    </svg>
  </div>
</body>
</html>
