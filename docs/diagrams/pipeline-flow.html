<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>myKG · Pipeline Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #f5f5f5;
      --color-ink:     #2d3142;
      --color-muted:   #4f5d75;
      --color-accent:  #6366f1;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1200px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Flowchart · myKG</p>
    <h1>The two-pass pipeline, with review and orphan-recovery branches</h1>

    <svg viewBox="0 0 1000 760" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f5f5"/>

      <!-- ─── Arrows (drawn first) ─── -->
      <!-- Start (y=72) → Pass 1 (y=128) -->
      <line x1="500" y1="104" x2="500" y2="124" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Pass 1 (y=128..184) → Review? diamond (y=216..296) -->
      <line x1="500" y1="184" x2="500" y2="212" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Review? NO (right side x=584,y=256) → merge dot (x=720,y=256) → down to Pass 2 (x=720) -->
      <line x1="584" y1="256" x2="716" y2="256" stroke="#4f5d75" stroke-width="1.2"/>
      <!-- Review? YES (bottom x=500,y=300) → merge -->
      <line x1="500" y1="300" x2="500" y2="380" stroke="#6366f1" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <!-- right path comes down -->
      <line x1="720" y1="256" x2="720" y2="380" stroke="#4f5d75" stroke-width="1.2"/>
      <line x1="720" y1="380" x2="660" y2="380" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Pass 2 → Orphans? diamond -->
      <line x1="500" y1="440" x2="500" y2="468" stroke="#6366f1" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <!-- Orphans? YES (right x=584,y=512) → Orphan-connect (x=720) -->
      <line x1="584" y1="512" x2="664" y2="512" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Orphan-connect down → merge dot -->
      <line x1="752" y1="544" x2="752" y2="612" stroke="#4f5d75" stroke-width="1.2"/>
      <line x1="752" y1="612" x2="504" y2="612" stroke="#4f5d75" stroke-width="1.2"/>
      <!-- Orphans? NO down to merge dot -->
      <line x1="500" y1="556" x2="500" y2="608" stroke="#4f5d75" stroke-width="1.2"/>
      <!-- merge dot → Assemble & export -->
      <line x1="500" y1="616" x2="500" y2="644" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Assemble → End -->
      <line x1="500" y1="700" x2="500" y2="720" stroke="#4f5d75" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- ─── Arrow labels ─── -->
      <rect x="588" y="244" width="36" height="12" rx="2" fill="#f5f5f5"/>
      <text x="606" y="254" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">NO</text>

      <rect x="484" y="320" width="36" height="12" rx="2" fill="#f5f5f5"/>
      <text x="502" y="330" fill="#6366f1" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">YES</text>

      <rect x="588" y="500" width="36" height="12" rx="2" fill="#f5f5f5"/>
      <text x="606" y="510" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">YES</text>

      <rect x="484" y="572" width="36" height="12" rx="2" fill="#f5f5f5"/>
      <text x="502" y="582" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">NO</text>

      <!-- ─── Node: Start (oval) ─── -->
      <rect x="396" y="64" width="208" height="40" rx="20" fill="#f5f5f5"/>
      <rect x="396" y="64" width="208" height="40" rx="20" fill="rgba(79,93,117,0.10)" stroke="#7a8399" stroke-width="1"/>
      <text x="500" y="89" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Mixed input directory</text>

      <!-- ─── Node: Pass 1 (step rect) ─── -->
      <rect x="380" y="124" width="240" height="60" rx="6" fill="#f5f5f5"/>
      <rect x="380" y="124" width="240" height="60" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <rect x="388" y="132" width="44" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
      <text x="410" y="141" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">LLM · 3 CALLS</text>
      <text x="500" y="160" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Pass 1 — induce RDFS schema</text>
      <text x="500" y="176" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">concepts · properties · domain/range</text>

      <!-- ─── Decision: Review schema? (diamond, center 500,256, w=168 h=84) ─── -->
      <polygon points="500,212 584,256 500,300 416,256" fill="#f5f5f5"/>
      <polygon points="500,212 584,256 500,300 416,256" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="500" y="252" fill="#2d3142" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Review schema?</text>
      <text x="500" y="268" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">--review flag</text>

      <!-- ─── Node: Human edit + approve (right branch detour at x=664,y=348) ─── -->
      <rect x="664" y="348" width="208" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="664" y="348" width="208" height="64" rx="6" fill="rgba(79,93,117,0.10)" stroke="#7a8399" stroke-width="1" stroke-dasharray="4,3"/>
      <rect x="672" y="356" width="48" height="12" rx="2" fill="transparent" stroke="rgba(122,131,153,0.40)" stroke-width="0.8"/>
      <text x="696" y="365" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">OPTIONAL</text>
      <text x="768" y="384" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Edit schema.json</text>
      <text x="768" y="400" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">mykg approve-schema</text>

      <!-- ─── Node: Pass 2 (focal accent — heart of the pipeline) ─── -->
      <rect x="380" y="380" width="240" height="60" rx="6" fill="#f5f5f5"/>
      <rect x="380" y="380" width="240" height="60" rx="6" fill="rgba(99,102,241,0.08)" stroke="#6366f1" stroke-width="1"/>
      <rect x="388" y="388" width="44" height="12" rx="2" fill="transparent" stroke="rgba(99,102,241,0.50)" stroke-width="0.8"/>
      <text x="410" y="397" fill="#6366f1" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">LLM · PER FILE</text>
      <text x="608" y="436" fill="rgba(99,102,241,0.12)" font-size="28" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="end">02</text>
      <text x="500" y="416" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Pass 2 — extract instances</text>
      <text x="500" y="432" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">nodes · edges · confidence scores</text>

      <!-- ─── Decision: Orphans? (diamond at 500,512) ─── -->
      <polygon points="500,468 584,512 500,556 416,512" fill="#f5f5f5"/>
      <polygon points="500,468 584,512 500,556 416,512" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="500" y="508" fill="#2d3142" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Orphans?</text>
      <text x="500" y="524" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">co-occurrence scan</text>

      <!-- ─── Node: Orphan-connect (LLM step, right) ─── -->
      <rect x="664" y="480" width="208" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="664" y="480" width="208" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <rect x="672" y="488" width="36" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
      <text x="690" y="497" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">LLM</text>
      <text x="768" y="516" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Orphan-connect pass</text>
      <text x="768" y="532" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">method: orphan_inferred</text>

      <!-- ─── Merge dot ─── -->
      <circle cx="500" cy="612" r="4" fill="#2d3142"/>

      <!-- ─── Node: Assemble & export ─── -->
      <rect x="380" y="644" width="240" height="56" rx="6" fill="#f5f5f5"/>
      <rect x="380" y="644" width="240" height="56" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <rect x="388" y="652" width="40" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
      <text x="408" y="661" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">DETERM</text>
      <text x="500" y="678" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Assemble · normalize · export</text>
      <text x="500" y="692" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">dedup · alias · validate · write</text>

      <!-- ─── End (oval) ─── -->
      <rect x="380" y="720" width="240" height="40" rx="20" fill="#f5f5f5"/>
      <rect x="380" y="720" width="240" height="40" rx="20" fill="rgba(99,102,241,0.08)" stroke="#6366f1" stroke-width="1"/>
      <text x="500" y="745" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">JSONL · TTL · NetworkX · Obsidian</text>
    </svg>
  </div>
</body>
</html>
