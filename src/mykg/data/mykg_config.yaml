          - .doc
          - .pptx
          - .xlsx
          - .png
          - .jpg
          - .jpeg
          - .html
          - .htm
      # --- Fetch (optional web crawl via fetch-web command) --------------------
      # The crawler runs inside an ephemeral uv-managed venv created per fetch-web
